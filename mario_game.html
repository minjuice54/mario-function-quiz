<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일차함수 마리오 퀴즈</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#1a1a2e;font-family:'Apple SD Gothic Neo',sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden}

/* 배경 파이프 데코 */
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(39,174,96,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(83,74,183,0.15) 0%, transparent 50%);
  pointer-events:none}

.wrap{width:100%;max-width:680px;padding:16px;position:relative}

/* ── 시작 화면 ── */
#scr-start{text-align:center;padding:40px 24px}
.game-title{font-family:'Press Start 2P',monospace;font-size:20px;color:#FFD700;
  text-shadow:4px 4px #7d5a00;line-height:1.8;margin-bottom:20px}
.game-sub{font-family:'Press Start 2P',monospace;font-size:8px;color:#aaa;
  line-height:2.4;margin-bottom:28px}
.name-box{display:flex;flex-direction:column;gap:10px;align-items:center;margin-bottom:24px}
.px-input{font-family:'Press Start 2P',monospace;font-size:10px;padding:12px 16px;
  background:#000;color:#FFD700;border:2px solid #FFD700;border-radius:6px;
  text-align:center;outline:none;width:220px}
.px-input::placeholder{color:#444}
.px-input:focus{border-color:#fff;box-shadow:0 0 0 3px rgba(255,215,0,0.2)}
.start-btn{font-family:'Press Start 2P',monospace;font-size:13px;padding:16px 36px;
  background:#E52521;color:#fff;border:none;border-radius:6px;cursor:pointer;
  box-shadow:0 5px #8B1210;transition:all .1s;margin-top:4px}
.start-btn:hover{background:#ff3330}
.start-btn:active{transform:translateY(4px);box-shadow:0 1px #8B1210}

/* ── HUD ── */
#hud{display:none;justify-content:space-between;align-items:center;
  background:#111;border:2px solid #333;border-radius:10px;
  padding:12px 20px;margin-bottom:14px}
.hud-item{text-align:center}
.hud-label{font-family:'Press Start 2P',monospace;font-size:7px;color:#888;display:block;margin-bottom:3px}
.hud-val{font-family:'Press Start 2P',monospace;font-size:13px;color:#FFD700}

/* ── 문제 카드 ── */
#scr-game{display:none}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.q-num{font-family:'Press Start 2P',monospace;font-size:9px;color:#888}
.timer-wrap{flex:1;height:10px;background:#333;border-radius:5px;overflow:hidden;margin:0 14px}
.timer-bar{height:100%;background:#FFD700;border-radius:5px;transition:width .1s linear}
.timer-txt{font-family:'Press Start 2P',monospace;font-size:11px;color:#FFD700;min-width:24px;text-align:right}

.q-card{background:#16213e;border:3px solid #534AB7;border-radius:14px;
  padding:22px 24px;margin-bottom:16px;text-align:center}
.q-text{font-size:20px;font-weight:700;color:#fff;line-height:1.6;margin-bottom:8px}
.q-hint{font-size:13px;color:#aaa}

/* 보기 버튼 */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{font-size:16px;font-weight:700;padding:20px 14px;border:none;border-radius:12px;
  cursor:pointer;transition:transform .1s, filter .1s;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:10px;min-height:80px;
  font-family:inherit;line-height:1.4}
.choice:active{transform:scale(0.95)}
.choice:disabled{cursor:not-allowed;filter:brightness(0.6)}
.choice-0{background:#E52521;color:#fff}
.choice-1{background:#1A6FB5;color:#fff}
.choice-2{background:#239B56;color:#fff}
.choice-0:hover:not(:disabled){filter:brightness(1.15)}
.choice-1:hover:not(:disabled){filter:brightness(1.15)}
.choice-2:hover:not(:disabled){filter:brightness(1.15)}
.choice.correct{animation:correct-flash .4s ease;box-shadow:0 0 0 4px #FFD700}
.choice.wrong{animation:wrong-shake .4s ease;filter:brightness(0.5)}
@keyframes correct-flash{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes wrong-shake{0%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}100%{transform:translateX(0)}}

.choice-icon{font-size:22px}
.choice-label{font-size:11px;opacity:0.7;font-family:'Press Start 2P',monospace}

/* 피드백 */
.feedback{border-radius:10px;padding:14px 18px;text-align:center;
  font-family:'Press Start 2P',monospace;font-size:10px;line-height:1.8;
  margin-bottom:14px;display:none}
.feedback.ok{background:#1D9E75;color:#fff;border:2px solid #9FE1CB}
.feedback.ng{background:#C0392B;color:#fff;border:2px solid #F0997B}

/* 다음 버튼 */
.next-btn{display:none;width:100%;font-family:'Press Start 2P',monospace;
  font-size:11px;padding:14px;background:#534AB7;color:#fff;border:none;
  border-radius:10px;cursor:pointer;box-shadow:0 4px #3C3489;transition:all .1s}
.next-btn:active{transform:translateY(3px);box-shadow:0 1px #3C3489}

/* ── 결과 화면 ── */
#scr-result{display:none;text-align:center;padding:24px}
.result-title{font-family:'Press Start 2P',monospace;font-size:18px;color:#FFD700;
  text-shadow:3px 3px #7d5a00;margin-bottom:20px;line-height:1.7}
.result-stats{background:#16213e;border:2px solid #534AB7;border-radius:12px;
  padding:16px 24px;margin-bottom:16px;text-align:left}
.stat-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid #2a2a4e;
  font-family:'Press Start 2P',monospace;font-size:9px;color:#ccc}
.stat-row:last-child{border-bottom:none}
.stat-row span:last-child{color:#FFD700}
.result-rank{font-family:'Press Start 2P',monospace;font-size:28px;
  margin:10px 0;line-height:1.4}
.save-msg{font-family:'Press Start 2P',monospace;font-size:8px;color:#aaa;margin-bottom:14px}
.replay-btn{font-family:'Press Start 2P',monospace;font-size:11px;padding:14px 28px;
  background:#E52521;color:#fff;border:none;border-radius:6px;cursor:pointer;
  box-shadow:0 4px #8B1210}
.replay-btn:active{transform:translateY(3px);box-shadow:0 1px #8B1210}

/* 코인 파티클 */
.coin-pop{position:fixed;font-size:20px;pointer-events:none;z-index:999;
  animation:coinfly 0.9s ease-out forwards}
@keyframes coinfly{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-80px) scale(1.5)}}

/* 마리오 장식 */
.mario-deco{font-size:32px;margin-bottom:10px;animation:bounce 0.8s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="wrap">

  <!-- 시작 화면 -->
  <div id="scr-start">
    <div class="mario-deco">🍄</div>
    <div class="game-title">일차함수<br>퀴즈!</div>
    <div class="game-sub">5문제 · 타이머 · 점수 경쟁<br>빠를수록 고득점!</div>
    <div class="name-box">
      <input class="px-input" id="inName" placeholder="이름 입력" maxlength="10">
      <input class="px-input" id="inId"   placeholder="학번 입력" maxlength="10">
    </div>
    <button class="start-btn" onclick="startGame()">▶ START</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-val" id="hScore">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">COINS</span>
      <span class="hud-val" id="hCoins">🪙 0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">CORRECT</span>
      <span class="hud-val" id="hCorrect">0/0</span>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div id="scr-game">
    <div class="q-header">
      <span class="q-num" id="qNum">Q1/5</span>
      <div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>
      <span class="timer-txt" id="timerTxt">15</span>
    </div>
    <div class="q-card">
      <div class="q-text" id="qText"></div>
      <div class="q-hint" id="qHint"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <!-- 결과 화면 -->
  <div id="scr-result">
    <div class="result-rank" id="resultRank"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-stats" id="resultStats"></div>
    <div class="save-msg" id="saveMsg"></div>
    <button class="replay-btn" onclick="location.reload()">↺ 다시하기</button>
  </div>

</div>

<script>
// ── Firebase ──────────────────────────────────
const FBC={
  apiKey:"AIzaSyD79uao_j3-MLp7712PlGNT6CFje0zmZWw",
  authDomain:"functionproject-85177.firebaseapp.com",
  databaseURL:"https://functionproject-85177-default-rtdb.firebaseio.com",
  projectId:"functionproject-85177",
  storageBucket:"functionproject-85177.firebasestorage.app",
  messagingSenderId:"405564164324",
  appId:"1:405564164324:web:b6103f58eb74a4d09704f1"
};
let fbDB=null;
(function(){
  const s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload=()=>{
    const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    s2.onload=()=>{firebase.initializeApp(FBC);fbDB=firebase.database();};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
})();

// ── 문제 ─────────────────────────────────────
const QS=[
  {t:"y = 3x + 1 의 그래프 방향은?",
   h:"기울기 a = 3 의 부호를 보세요",
   c:["오른쪽 위로 향한다","오른쪽 아래로 향한다","수평선이다"],
   a:0, e:"a = 3 > 0 이므로 오른쪽 위로 향합니다!"},
  {t:"y = −2x + 5 에서 x가 커지면 y는?",
   h:"기울기 a = −2를 생각해보세요",
   c:["y도 커진다","y는 작아진다","y는 변하지 않는다"],
   a:1, e:"a < 0 이므로 x 증가 → y 감소!"},
  {t:"y = 2x+3 과 y = 2x−1 의 관계는?",
   h:"기울기가 같을 때 두 직선은?",
   c:["서로 평행하다","한 점에서 만난다","완전히 일치한다"],
   a:0, e:"기울기 같고 y절편 다름 → 평행!"},
  {t:"기울기 −½ 인 그래프 모양은?",
   h:"|a| 크기와 방향을 함께 생각해요",
   c:["완만하게 오른쪽 아래","가파르게 오른쪽 위","완만하게 오른쪽 위"],
   a:0, e:"a < 0 → 아래방향, |a| < 1 → 완만"},
  {t:"두 직선이 평행하려면?",
   h:"탐구2에서 발견한 규칙!",
   c:["기울기 같고 y절편이 달라야","기울기·y절편 모두 같아야","기울기가 달라야"],
   a:0, e:"기울기 같고 y절편 다를 때 → 평행!"}
];

const ICONS=['🍄','⭐','🌸'];
const TIMER_MAX=15;

let pName='', pId='';
let qIdx=0, score=0, coins=0, correct=0;
let timerVal=TIMER_MAX, timerInt=null;
let answered=false;

// ── 시작 ─────────────────────────────────────
function startGame(){
  pName=document.getElementById('inName').value.trim()||'학생';
  pId  =document.getElementById('inId').value.trim()||'000';
  document.getElementById('scr-start').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('scr-game').style.display='block';
  qIdx=0; score=0; coins=0; correct=0;
  showQuestion();
}

// ── 문제 표시 ─────────────────────────────────
function showQuestion(){
  answered=false;
  const Q=QS[qIdx];
  document.getElementById('qNum').textContent=`Q${qIdx+1}/5`;
  document.getElementById('qText').textContent=Q.t;
  document.getElementById('qHint').textContent=Q.h;
  document.getElementById('feedback').style.display='none';
  document.getElementById('nextBtn').style.display='none';

  // 보기 생성
  const ch=document.getElementById('choices');
  ch.innerHTML='';
  Q.c.forEach((txt,i)=>{
    const btn=document.createElement('button');
    btn.className=`choice choice-${i}`;
    btn.innerHTML=`<span class="choice-icon">${ICONS[i]}</span><span>${txt}</span>`;
    btn.onclick=()=>answer(i,btn);
    ch.appendChild(btn);
  });

  updateHUD();
  startTimer();
}

// ── 타이머 ────────────────────────────────────
function startTimer(){
  clearInterval(timerInt);
  timerVal=TIMER_MAX;
  updateTimerBar();
  timerInt=setInterval(()=>{
    timerVal-=0.1;
    updateTimerBar();
    if(timerVal<=0){clearInterval(timerInt);timeOut();}
  },100);
}

function updateTimerBar(){
  const pct=Math.max(0,timerVal/TIMER_MAX*100);
  const bar=document.getElementById('timerBar');
  bar.style.width=pct+'%';
  bar.style.background=pct>60?'#FFD700':pct>30?'#FF8C00':'#E52521';
  document.getElementById('timerTxt').textContent=Math.ceil(timerVal);
  document.getElementById('timerTxt').style.color=pct>30?'#FFD700':'#E52521';
}

function timeOut(){
  if(answered)return;
  answered=true;
  disableChoices();
  const Q=QS[qIdx];
  markCorrect(Q.a);
  showFeedback(false,'⏰ 시간 초과!  정답: '+Q.c[Q.a]+'  |  '+Q.e);
  setTimeout(nextQuestion,2000);
}

// ── 답변 처리 ─────────────────────────────────
function answer(ci, btn){
  if(answered)return;
  answered=true;
  clearInterval(timerInt);
  disableChoices();

  const Q=QS[qIdx];
  const ok=(ci===Q.a);
  const timeBonus=Math.round(timerVal/TIMER_MAX*300);

  if(ok){
    btn.classList.add('correct');
    correct++;
    const gained=200+timeBonus;
    score+=gained;
    coins+=Math.ceil(timerVal/3);
    showFeedback(true,`✓ 정답!  +${gained}점  (타이머 보너스 +${timeBonus})\n${Q.e}`);
    spawnCoins(btn);
  } else {
    btn.classList.add('wrong');
    markCorrect(Q.a);
    score=Math.max(0,score-100);
    showFeedback(false,`✗ 오답  -100점  |  정답: ${Q.c[Q.a]}\n${Q.e}`);
  }
  updateHUD();
  document.getElementById('nextBtn').style.display='block';
}

function disableChoices(){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
}
function markCorrect(ai){
  document.querySelectorAll('.choice')[ai]?.classList.add('correct');
}

function showFeedback(ok, msg){
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'ok':'ng');
  fb.textContent=msg;
  fb.style.display='block';
}

// ── 다음 문제 / 결과 ──────────────────────────
function nextQuestion(){
  qIdx++;
  if(qIdx>=QS.length){ showResult(); return; }
  showQuestion();
}

function showResult(){
  document.getElementById('scr-game').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('scr-result').style.display='block';

  const pct=correct/QS.length;
  let rank='',title='';
  if(pct===1)     {rank='🏆';title='완벽해요!\n만점 달성!';}
  else if(pct>=0.8){rank='⭐';title='훌륭해요!\n거의 다 맞혔어요!';}
  else if(pct>=0.6){rank='🍄';title='잘 했어요!\n조금 더 연습!';}
  else             {rank='🌸';title='다시 도전!\n탐구 내용을 복습해봐요';}

  document.getElementById('resultRank').textContent=rank;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultStats').innerHTML=`
    <div class="stat-row"><span>이름</span><span>${pName} (${pId})</span></div>
    <div class="stat-row"><span>최종 점수</span><span>${score.toLocaleString()}점</span></div>
    <div class="stat-row"><span>정답 수</span><span>${correct} / ${QS.length}</span></div>
    <div class="stat-row"><span>획득 코인</span><span>🪙 ${coins}</span></div>`;

  if(fbDB){
    document.getElementById('saveMsg').textContent='점수 저장 중...';
    fbDB.ref('quiz_scores').push({
      name:pName, studentId:pId, score, correct, coins,
      total:QS.length, time:Date.now()
    }).then(()=>document.getElementById('saveMsg').textContent='✓ 점수 저장 완료!')
      .catch(()=>document.getElementById('saveMsg').textContent='저장 실패');
  }
}

// ── HUD 업데이트 ──────────────────────────────
function updateHUD(){
  document.getElementById('hScore').textContent=score.toLocaleString();
  document.getElementById('hCoins').textContent='🪙 '+coins;
  document.getElementById('hCorrect').textContent=correct+'/'+qIdx;
}

// ── 코인 파티클 ───────────────────────────────
function spawnCoins(btn){
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<5;i++){
    const el=document.createElement('div');
    el.className='coin-pop';
    el.textContent='🪙';
    el.style.cssText=`left:${cx-10+(Math.random()-0.5)*60}px;top:${cy}px;
      animation-delay:${i*0.08}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
}
</script>
</body>
</html>
